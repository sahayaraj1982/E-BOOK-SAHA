<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHA V81 FINAL PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --p-bg: #0f172a; --out: #000; }
        body { background-color: #475569; font-family: 'Arial Black', sans-serif; font-weight: 950; }
        .main-box { border: 12px solid var(--out); margin: 10px auto; border-radius: 40px; background: #f1f5f9; width: 95%; overflow: hidden; }
        .header { background-color: var(--p-bg); padding: 15px 25px; border-bottom: 12px solid var(--out); color: white; position: relative; }
        .btn-style { border-bottom: 6px solid #000; cursor: pointer; text-transform: uppercase; transition: 0.1s; text-align: center; }
        .btn-style:active { transform: translateY(3px); border-bottom-width: 3px; }
        .cp-card { background: #fff; width: 95%; max-width: 1400px; border-radius: 40px; padding: 25px; border: 12px solid #000; max-height: 90vh; overflow-y: auto; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 10px; border: 2.5px solid #000; border-radius: 12px; margin-bottom: 5px; font-size: 13px; }
        .filter-active { background-color: #ef4444 !important; color: white !important; border: 3px solid #000 !important; }
    </style>
</head>
<body>

<div id="loginPage" class="flex items-center justify-center h-screen bg-slate-900">
    <div class="bg-white p-10 rounded-[50px] border-[10px] border-black text-center w-[450px]">
        <h1 class="text-3xl mb-8 font-black text-blue-900" id="loginTitle">SAHA ADMIN</h1>
        <div class="flex justify-around mb-8 bg-gray-100 p-4 rounded-2xl border-2 border-black">
            <div class="text-xs font-black">TOTAL <br><input type="checkbox" id="swGrand" checked class="w-6 h-6"></div>
            <div class="text-xs font-black">CAT BAL <br><input type="checkbox" id="swCat" checked class="w-6 h-6"></div>
        </div>
        <input type="password" id="loginPass" class="text-center text-5xl p-4 border-4 border-black rounded-2xl w-full font-black mb-8" placeholder="****">
        <button onclick="handleLogin()" class="w-full bg-blue-700 text-white py-5 rounded-2xl text-2xl btn-style font-black">LOGIN ✅</button>
    </div>
</div>

<div id="appPage" class="hidden">
    <div id="mainContainer" class="main-box mx-auto">
        <div class="header flex justify-between items-center">
            <div onclick="openSettings()" class="absolute top-0 right-0 w-24 h-24 cursor-pointer z-50"></div>
            
            <div class="flex items-center gap-4">
                <div class="flex flex-col gap-2">
                    <button onclick="location.reload()" class="bg-red-600 w-10 h-10 rounded-full border-2 border-black text-white font-bold">⬅</button>
                    <button onclick="document.getElementById('bellDate').showPicker()" class="bg-yellow-400 w-10 h-10 rounded-full border-2 border-black text-xl">🔔</button>
                </div>
                <input type="date" id="bellDate" onchange="setStartingDate()" class="absolute opacity-0 pointer-events-none">
                <div>
                    <h1 id="dispTitle" class="text-3xl italic uppercase font-black"></h1>
                    <div class="flex gap-4 text-sm font-bold"><span id="headerDate"></span><span id="headerTime" class="text-yellow-400"></span></div>
                    <p id="startLabel" class="text-[10px] text-green-300 font-black italic uppercase"></p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-[10px] opacity-70">RECORDS: <span id="recCount" class="text-yellow-400">0</span></p>
                <h2 id="mainTotal" class="text-5xl font-black">₹0</h2>
            </div>
        </div>

        <div class="p-6">
            <div id="catGrid" class="grid grid-cols-2 md:grid-cols-7 gap-3 mb-6"></div>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white p-5 rounded-3xl border-4 border-black shadow-[0_10px_0_#000]">
                    <h3 class="text-xl border-b-4 border-green-600 mb-4 font-black">TRANSACTION ENTRY</h3>
                    <input type="hidden" id="editId">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="date" id="eDate" class="border-2 border-black p-2 rounded font-black">
                        <input type="tel" id="eMob" placeholder="Mobile" class="border-2 border-black p-2 rounded font-black">
                        <select id="eCat" class="border-2 border-black p-2 rounded font-black"></select>
                        <input type="text" id="eDesc" placeholder="Remark" class="border-2 border-black p-2 rounded font-black">
                        <input type="number" id="eAmt" placeholder="Amount" class="border-2 border-black p-2 rounded font-black text-2xl text-blue-700">
                        <select id="eType" class="border-2 border-black p-2 rounded font-black"><option value="CR">IN (+)</option><option value="DR">OUT (-)</option></select>
                    </div>
                    <button id="saveBtn" onclick="saveData()" class="w-full py-5 mt-5 rounded-xl text-xl btn-style bg-green-600 text-white font-black">SAVE & SYNC ✅</button>
                </div>

                <div class="bg-white p-5 rounded-3xl border-4 border-black shadow-[0_10px_0_#000]">
                    <h3 class="text-xl border-b-4 border-blue-600 mb-4 font-black">TOOLS & CLOUD</h3>
                    <div class="grid grid-cols-3 gap-2 mb-4">
                        <input type="date" id="fDate" class="text-[10px] border-2 border-black p-1 rounded font-black" onchange="refresh()">
                        <input type="date" id="tDate" class="text-[10px] border-2 border-black p-1 rounded font-black" onchange="refresh()">
                        <input type="tel" id="sMob" placeholder="Search..." class="text-[10px] border-2 border-black p-1 rounded font-black" onkeyup="refresh()">
                    </div>
                    <div id="filterCatList" class="flex flex-wrap gap-2 mb-4"></div>
                    <div class="grid grid-cols-3 gap-3">
                        <button onclick="downloadPDF()" class="bg-orange-600 py-3 rounded-lg btn-style text-white text-[10px] font-black">PDF REPORT</button>
                        <button onclick="syncCloud()" class="bg-blue-600 py-3 rounded-lg btn-style text-white text-[10px] font-black">DRIVE SYNC</button>
                        <button onclick="exportData()" class="bg-emerald-700 py-3 rounded-lg btn-style text-white text-[10px] font-black">EXPORT JSON</button>
                        <button onclick="document.getElementById('importFile').click()" class="bg-yellow-600 py-3 rounded-lg btn-style text-white text-[10px] font-black">IMPORT JSON</button>
                        <input type="file" id="importFile" onchange="importData(event)" class="hidden">
                        <button onclick="refresh()" class="bg-slate-800 text-white py-3 rounded-lg btn-style text-[10px] font-black">REFRESH</button>
                        <button onclick="deleteAll()" class="bg-red-600 py-3 rounded-lg btn-style text-white text-[10px] font-black">DELETE ALL</button>
                    </div>
                </div>
            </div>

            <div class="mt-8 bg-white border-4 border-black rounded-3xl overflow-hidden shadow-[0_10px_0_#000]">
                <table class="w-full text-sm" id="mainTable">
                    <thead class="bg-black text-white">
                        <tr><th class="p-3">DATE</th><th class="p-3">MOBILE</th><th class="p-3">CAT</th><th class="p-3 text-left">REMARK</th><th class="p-3 text-right">AMOUNT</th><th class="p-3">ACTION</th></tr>
                    </thead>
                    <tbody id="resTable" class="text-center font-bold"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="setModal" class="hidden fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-4">
    <div class="cp-card">
        <h2 class="text-4xl font-black italic text-blue-800 border-b-8 border-black mb-8 pb-4">V81 MASTER CONTROL (42 OPTIONS)</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="p-5 border-4 border-black rounded-3xl bg-blue-50">
                <p class="font-black border-b-2 border-black mb-4 uppercase">System Visuals & Security</p>
                <div class="setting-row"><span>App Title</span><input type="text" id="sTitle" class="w-32 border-2 border-black"></div>
                <div class="setting-row"><span>Header Color</span><input type="color" id="sColor" class="w-16"></div>
                <div class="setting-row"><span>Width %</span><input type="number" id="sWidth" class="w-20 border-2 border-black"></div>
                <div class="setting-row"><span>Login PIN</span><input type="text" id="sLoginPin" class="w-24 border-2 border-black"></div>
                <div class="setting-row"><span>Admin PIN</span><input type="text" id="sAdminPin" class="w-24 border-2 border-black"></div>
                <div class="setting-row"><span>Multi-Filter</span><input type="checkbox" id="sMFS"></div>
            </div>
            <div class="col-span-2 p-5 border-4 border-black rounded-3xl bg-green-50">
                <p class="font-black border-b-2 border-black mb-4 uppercase">Category Rename & Visibility</p>
                <div id="catMasterList" class="grid grid-cols-2 gap-3 max-h-[400px] overflow-y-auto pr-2"></div>
            </div>
        </div>
        <div class="flex gap-4 mt-10">
            <button onclick="saveSettings()" class="flex-1 bg-blue-700 text-white py-6 rounded-3xl text-3xl btn-style font-black">SYNC TO DRIVE ✅</button>
            <button onclick="closeSettings()" class="bg-red-600 text-white px-10 py-6 rounded-3xl text-xl btn-style font-black uppercase">Close</button>
        </div>
    </div>
</div>

<script>
const CLOUD_URL = "https://script.google.com/macros/s/AKfycbyCe3j8C0hIbs5dLlnz9_wjtmhPy6vOXJ8G6SYbxbuROhKC9Z3P0AuoN-zJtRibVEEE/exec";

let db = JSON.parse(localStorage.getItem('sahav81_db')) || [];
let cfg = JSON.parse(localStorage.getItem('sahav81_cfg')) || {
    title: "SAHA-V81", headCol: "#0f172a", scrW: 95, loginPin: "1982", adminPin: "1020", startingDate: "", mfs: true,
    cats: ["TICKET", "FINANCE", "RO", "OTHER", "SHOP", "GENERAL", "EXTRA", "RENT", "EB", "WAGES", "LOAN"],
    catStatus: Array(11).fill(true)
};

let isG, isC, activeFilters = [];

function handleLogin() {
    if(document.getElementById('loginPass').value === cfg.loginPin) {
        isG = document.getElementById('swGrand').checked;
        isC = document.getElementById('swCat').checked;
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('appPage').classList.remove('hidden');
        init();
    } else alert("WRONG PIN!");
}

function init() {
    document.documentElement.style.setProperty('--p-bg', cfg.headCol);
    document.getElementById('mainContainer').style.width = cfg.scrW + "%";
    document.getElementById('dispTitle').innerText = cfg.title;
    document.getElementById('startLabel').innerText = cfg.startingDate ? "FROM: " + cfg.startingDate.split('-').reverse().join('/') : "";
    renderUI(); refresh();
    setInterval(() => {
        const n = new Date();
        document.getElementById('headerDate').innerText = n.toLocaleDateString('en-GB');
        document.getElementById('headerTime').innerText = n.toLocaleTimeString('en-GB');
    }, 1000);
}

function renderUI() {
    const grid = document.getElementById('catGrid'), eSel = document.getElementById('eCat'), fList = document.getElementById('filterCatList');
    grid.innerHTML = ""; eSel.innerHTML = "";
    fList.innerHTML = `<button onclick="toggleFilter('ALL')" id="btn_ALL" class="bg-gray-200 border-2 border-black px-3 py-1 rounded-lg btn-style text-[10px] filter-active">ALL</button>`;
    cfg.cats.forEach((c, i) => {
        if(cfg.catStatus[i]) {
            grid.innerHTML += `<div class="bg-white border-4 border-black p-3 rounded-2xl text-center shadow-[4px_4px_0_#000]"><p class="text-[10px] font-black opacity-60">${c}</p><h3 class="text-xl font-black text-blue-800 ${!isC?'blur-[10px] opacity-30':''}">₹<span id="sum_${c}">0</span></h3></div>`;
            eSel.innerHTML += `<option value="${c}">${c}</option>`;
            fList.innerHTML += `<button onclick="toggleFilter('${c}')" id="btn_${c}" class="bg-gray-200 border-2 border-black px-3 py-1 rounded-lg btn-style text-[10px] ml-1">${c}</button>`;
        }
    });
}

function saveData() {
    const eid = document.getElementById('editId').value;
    let entry = { id: eid ? parseInt(eid) : Date.now(), date: document.getElementById('eDate').value, mob: document.getElementById('eMob').value || "-", cat: document.getElementById('eCat').value, desc: document.getElementById('eDesc').value || "-", amt: Number(document.getElementById('eAmt').value), type: document.getElementById('eType').value };
    if(!entry.date || entry.amt <= 0) return alert("Enter Data!");
    if(eid) { const idx = db.findIndex(x => x.id === parseInt(eid)); db[idx] = entry; } else db.push(entry);
    document.getElementById('editId').value = ""; document.getElementById('eAmt').value = "";
    syncCloud();
}

function refresh() {
    let html = "", grand = 0, sums = {}; cfg.cats.forEach(c => sums[c] = 0);
    const fD = document.getElementById('fDate').value, tD = document.getElementById('tDate').value, sM = document.getElementById('sMob').value;
    let filtered = db.sort((a,b) => new Date(b.date) - new Date(a.date)).filter(t => {
        const mBell = (!cfg.startingDate || t.date >= cfg.startingDate);
        const mCat = (activeFilters.length === 0 || activeFilters.includes(t.cat));
        const mDate = (!fD || t.date >= fD) && (!tD || t.date <= tD);
        const mMob = (!sM || t.mob.includes(sM));
        return mBell && mCat && mDate && mMob;
    });
    filtered.forEach(t => {
        let v = (t.type === "CR") ? t.amt : -t.amt; sums[t.cat] += v; grand += v;
        html += `<tr class="border-b border-black/10"><td class="p-3">${t.date.split('-').reverse().join('/')}</td><td class="p-3">${t.mob}</td><td class="p-3">${t.cat}</td><td class="p-3 text-left text-blue-800">${t.desc}</td><td class="p-3 text-right font-black ${t.type==='CR'?'text-green-600':'text-red-600'}">₹${t.amt.toLocaleString()}</td><td class="p-3 flex gap-2 justify-center"><button onclick="edit(${t.id})">🖋</button><button onclick="del(${t.id})" class="text-red-600">✖</button></td></tr>`;
    });
    document.getElementById('resTable').innerHTML = html;
    document.getElementById('mainTotal').innerText = "₹" + grand.toLocaleString();
    document.getElementById('mainTotal').className = isG ? "text-5xl font-black" : "text-5xl font-black blur-[10px] opacity-30";
    document.getElementById('recCount').innerText = filtered.length;
    cfg.cats.forEach(c => { if(document.getElementById('sum_'+c)) document.getElementById('sum_'+c).innerText = (sums[c]||0).toLocaleString(); });
}

function edit(id) {
    const t = db.find(x => x.id === id);
    document.getElementById('editId').value = t.id; document.getElementById('eDate').value = t.date;
    document.getElementById('eMob').value = t.mob; document.getElementById('eCat').value = t.cat;
    document.getElementById('eDesc').value = t.desc; document.getElementById('eAmt').value = t.amt;
    document.getElementById('eType').value = t.type; window.scrollTo({top:0, behavior:'smooth'});
}

function openSettings() {
    if(prompt("ADMIN PIN:") === cfg.adminPin) {
        document.getElementById('setModal').classList.remove('hidden');
        document.getElementById('sTitle').value = cfg.title; document.getElementById('sColor').value = cfg.headCol;
        document.getElementById('sWidth').value = cfg.scrW; document.getElementById('sLoginPin').value = cfg.loginPin;
        document.getElementById('sAdminPin').value = cfg.adminPin; document.getElementById('sMFS').checked = cfg.mfs;
        let area = document.getElementById('catMasterList'); area.innerHTML = "";
        cfg.cats.forEach((c, i) => {
            area.innerHTML += `<div class="setting-row"><span>#${i+1} Name:</span><input type="text" id="cn_${i}" value="${c}" class="w-32 border-2 border-black p-1 uppercase"><span>Visible:</span><input type="checkbox" id="cs_${i}" ${cfg.catStatus[i]?'checked':''} class="w-6 h-6"></div>`;
        });
    }
}

function saveSettings() {
    cfg.title = document.getElementById('sTitle').value; cfg.headCol = document.getElementById('sColor').value;
    cfg.scrW = document.getElementById('sWidth').value; cfg.loginPin = document.getElementById('sLoginPin').value;
    cfg.adminPin = document.getElementById('sAdminPin').value; cfg.mfs = document.getElementById('sMFS').checked;
    cfg.cats.forEach((_, i) => { cfg.cats[i] = document.getElementById(`cn_${i}`).value.toUpperCase(); cfg.catStatus[i] = document.getElementById(`cs_${i}`).checked; });
    syncCloud(); setTimeout(() => location.reload(), 500);
}

function downloadPDF() {
    const { jsPDF } = window.jspdf; const doc = new jsPDF('p', 'pt');
    doc.setFontSize(20); doc.text(cfg.title + " REPORT", 40, 50);
    doc.setFontSize(12); doc.text("Grand Total: " + document.getElementById('mainTotal').innerText, 40, 80);
    let y = 100; cfg.cats.forEach(c => { if(document.getElementById('sum_'+c)) { doc.text(c + ": ₹" + document.getElementById('sum_'+c).innerText, 40, y); y += 15; } });
    doc.autoTable({ html: '#mainTable', startY: y + 20, theme: 'grid' });
    doc.save("Report.pdf");
}

function syncCloud() { localStorage.setItem('sahav81_db', JSON.stringify(db)); localStorage.setItem('sahav81_cfg', JSON.stringify(cfg)); fetch(CLOUD_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ cfg, db }) }).then(() => refresh()); }
function exportData() { const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({cfg, db})); const a = document.createElement('a'); a.href = dataStr; a.download = "backup.json"; a.click(); }
function importData(e) { const reader = new FileReader(); reader.onload = (x) => { const d = JSON.parse(x.target.result); localStorage.setItem('sahav81_cfg', JSON.stringify(d.cfg)); localStorage.setItem('sahav81_db', JSON.stringify(d.db)); location.reload(); }; reader.readAsText(e.target.files[0]); }
function setStartingDate() { cfg.startingDate = document.getElementById('bellDate').value; syncCloud(); location.reload(); }
function toggleFilter(cat) { if(!cfg.mfs) activeFilters = (cat === 'ALL') ? [] : [cat]; else { if(cat === 'ALL') activeFilters = []; else { const idx = activeFilters.indexOf(cat); if(idx > -1) activeFilters.splice(idx, 1); else activeFilters.push(cat); } } refresh(); updateFilterUI(); }
function updateFilterUI() { document.querySelectorAll('#filterCatList button').forEach(b => b.classList.remove('filter-active')); if(activeFilters.length === 0) document.getElementById('btn_ALL').classList.add('filter-active'); else activeFilters.forEach(c => document.getElementById('btn_'+c)?.classList.add('filter-active')); }
function del(id) { if(confirm("Delete?")) { db = db.filter(x => x.id !== id); syncCloud(); } }
function closeSettings() { document.getElementById('setModal').classList.add('hidden'); }
function deleteAll() { if(confirm("Clear All?")) { db = []; syncCloud(); } }
</script>
</body>
</html>
